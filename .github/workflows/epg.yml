name: Generate EPG

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа (UTC); Actions может задержать на пару минут
  workflow_dispatch:         # ручной запуск с вкладки Actions

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate epg.json
        run: python generate_epg.py
      - name: Commit if changed
        run: |
          git config user.name "epg-bot"
          git config user.email "epg-bot@users.noreply.github.com"
          git add epg.json
          if git diff --cached --quiet; then
            echo "No EPG changes."
          else
            git commit -m "Update EPG $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
